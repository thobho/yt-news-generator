name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: webapp/frontend/package-lock.json

      - name: Build frontend
        working-directory: webapp/frontend
        run: |
          npm ci
          npm run build

      - name: Copy frontend build to backend static
        run: |
          rm -rf webapp/backend/static
          cp -r webapp/frontend/dist webapp/backend/static

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Write credentials
        run: |
          mkdir -p /tmp/deploy-credentials/pl
          mkdir -p /tmp/deploy-credentials/us
          printf '%s' '${{ secrets.ENV_PRODUCTION }}' > /tmp/deploy-credentials/env.production
          printf '%s' '${{ secrets.YT_CLIENT_SECRETS_PL }}' > /tmp/deploy-credentials/pl/client_secrets.json
          printf '%s' '${{ secrets.YT_CLIENT_SECRETS_US }}' > /tmp/deploy-credentials/us/client_secrets.json
          # token.json is NOT deployed from CI - it is managed on the VPS via the "Refresh Token" button in the UI

      - name: Sync project files to VPS
        run: |
          rsync -azq --delete \
            --exclude 'node_modules' \
            --exclude 'venv' \
            --exclude '__pycache__' \
            --exclude '.git' \
            --exclude 'credentials' \
            --exclude '*.pem' \
            --exclude 'output' \
            --exclude 'storage' \
            --exclude 'logs' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./ deploy@${{ secrets.HOST }}:/home/deploy/yt-news-generator/

      - name: Copy credentials to VPS
        run: |
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            /tmp/deploy-credentials/env.production \
            deploy@${{ secrets.HOST }}:/home/deploy/yt-news-generator/.env

          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            deploy@${{ secrets.HOST }} \
            "mkdir -p /home/deploy/yt-news-generator/credentials/pl /home/deploy/yt-news-generator/credentials/us"

          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            /tmp/deploy-credentials/pl/client_secrets.json \
            deploy@${{ secrets.HOST }}:/home/deploy/yt-news-generator/credentials/pl/

          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            /tmp/deploy-credentials/us/client_secrets.json \
            deploy@${{ secrets.HOST }}:/home/deploy/yt-news-generator/credentials/us/

      - name: Install dependencies and restart
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            deploy@${{ secrets.HOST }} << 'REMOTE_SCRIPT'
          set -e
          cd /home/deploy/yt-news-generator

          # Swap setup for low-memory instances
          TOTAL_MEM=$(free -m | awk '/^Mem:/{print $2}')
          SWAP_TOTAL=$(free -m | awk '/^Swap:/{print $2}')
          if [ "$TOTAL_MEM" -lt 2048 ] && [ "$SWAP_TOTAL" -lt 1024 ]; then
            echo "Setting up swap..."
            if [ ! -f /swapfile ]; then
              sudo fallocate -l 2G /swapfile
              sudo chmod 600 /swapfile
              sudo mkswap /swapfile
              sudo swapon /swapfile
              echo '/swapfile none swap sw 0 0' | sudo tee -a /etc/fstab
            else
              sudo swapon /swapfile 2>/dev/null || true
            fi
          fi

          # Python dependencies
          source venv/bin/activate
          pip install -q -r requirements.txt
          pip install -q -r webapp/backend/requirements.txt

          # Remotion NPM dependencies
          cd remotion
          if [ ! -d "node_modules" ]; then
            npm install
          else
            npm install --prefer-offline
          fi
          cd ..

          # Restart webapp
          source .env
          # Diagnostic: who owns port 8000 (needs sudo to see other users' procs)
          echo "--- port 8000 owner before kill ---"
          sudo ss -tlnp 2>/dev/null | grep ':8000 ' || echo "(nothing on 8000)"
          sudo lsof -i :8000 -sTCP:LISTEN 2>/dev/null || true
          # Detect a systemd unit that may be auto-respawning uvicorn
          SYSTEMD_UNIT=$(sudo systemctl list-units --type=service --no-legend --plain 2>/dev/null \
            | awk '{print $1}' | xargs -I{} sh -c 'sudo systemctl show -p MainPID,FragmentPath {} 2>/dev/null | grep -q uvicorn && echo {}' 2>/dev/null | head -1 || true)
          if [ -n "$SYSTEMD_UNIT" ]; then
            echo "Detected systemd unit serving uvicorn: $SYSTEMD_UNIT — restarting via systemctl"
            sudo systemctl restart "$SYSTEMD_UNIT"
            sleep 3
            if sudo ss -tlnp 2>/dev/null | grep -q ':8000 '; then
              echo "Webapp restarted successfully via $SYSTEMD_UNIT"
              echo "--- port 8000 owner after restart ---"
              sudo ss -tlnp 2>/dev/null | grep ':8000 '
              exit 0
            fi
            echo "ERROR: $SYSTEMD_UNIT restarted but nothing bound to 8000"
            sudo journalctl -u "$SYSTEMD_UNIT" -n 40 --no-pager || true
            exit 1
          fi

          # No systemd unit — use nohup-style restart
          pkill -f 'uvicorn webapp.backend.main:app' 2>/dev/null || true
          for i in 1 2 3 4 5; do
            pgrep -f 'uvicorn webapp.backend.main:app' > /dev/null || break
            sleep 1
          done
          pkill -9 -f 'uvicorn webapp.backend.main:app' 2>/dev/null || true
          sleep 1
          # Force-free port 8000 if still held (covers root-owned procs)
          if sudo ss -tlnp 2>/dev/null | grep -q ':8000 '; then
            echo "Port 8000 still held — sending SIGTERM via fuser, allowing graceful drain"
            sudo fuser -k -TERM 8000/tcp 2>/dev/null || true
            # Wait up to 30s for graceful shutdown (background pipeline tasks may be running)
            for i in $(seq 1 30); do
              sudo ss -tlnp 2>/dev/null | grep -q ':8000 ' || break
              sleep 1
            done
            if sudo ss -tlnp 2>/dev/null | grep -q ':8000 '; then
              echo "Process still alive after 30s — escalating to SIGKILL"
              sudo fuser -k -KILL 8000/tcp 2>/dev/null || true
              sleep 2
            fi
          fi
          if sudo ss -tlnp 2>/dev/null | grep -q ':8000 '; then
            echo "ERROR: port 8000 still in use after kill"
            sudo ss -tlnp | grep ':8000 '
            exit 1
          fi

          # Clear any stale log file (may be owned by previous root-owned process)
          sudo rm -f /tmp/webapp.log

          nohup python -m uvicorn webapp.backend.main:app --host 0.0.0.0 --port 8000 > /tmp/webapp.log 2>&1 &
          NEW_PID=$!
          # Wait up to 15s for the new process to bind to 8000
          for i in $(seq 1 15); do
            if ss -tlnp 2>/dev/null | grep -q ":8000 .*pid=$NEW_PID"; then
              break
            fi
            if ! kill -0 "$NEW_PID" 2>/dev/null; then
              echo "ERROR: uvicorn (pid $NEW_PID) exited during startup"
              tail -40 /tmp/webapp.log
              exit 1
            fi
            sleep 1
          done

          # Healthcheck: confirm the NEW pid is serving 8000
          if ! ss -tlnp 2>/dev/null | grep -q ":8000 .*pid=$NEW_PID"; then
            echo "ERROR: new uvicorn (pid $NEW_PID) did not bind to port 8000"
            ss -tlnp | grep ':8000 ' || echo "(nothing on 8000)"
            tail -40 /tmp/webapp.log
            exit 1
          fi
          echo "Webapp restarted successfully (pid $NEW_PID)"
          REMOTE_SCRIPT

      - name: Cleanup
        if: always()
        run: |
          rm -rf /tmp/deploy-credentials
          rm -f ~/.ssh/deploy_key
          rm -f ~/.ssh/known_hosts
